# Each check below runs as a separate parallel job on its own runner (virtual machine).
# This means R and dependencies are installed once per job — not shared between jobs.
# That redundancy is intentional: parallel jobs give each check an independent status
# badge and surface all failures at once, rather than stopping at the first failure as
# sequential steps would. The trade-off (extra setup time per job) is worth it for the
# faster, clearer feedback.
on:
  workflow_call:
    inputs:
      extra-packages:
        type: string
        default: ''
        description: 'Additional packages for rendering README (e.g., any::ggthemes)'

name: check-extra

jobs:
  check-no-warnings:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          extra-packages: |
            any::devtools
            local::.

      - name: Run examples
        run: |
          options(crayon.enabled = TRUE,  warn = 2L)
          devtools::run_examples(fresh = TRUE, run_dontrun = TRUE, run_donttest = TRUE)
        shell: Rscript {0}

      - name: Run Tests
        run: |
          options(crayon.enabled = TRUE)
          pkgload::load_all()
          # this workaround needed to play nicely with parallel testing
          # see: https://github.com/r-lib/testthat/issues/1912
          test_script_paths <- testthat::find_test_scripts("tests/testthat")
          test_with_warning_as_error <- function(path) {
            withr::local_options(list(warn = 2L))
            testthat::test_file(path, stop_on_failure = TRUE, stop_on_warning = TRUE)
          }
          purrr::walk(test_script_paths, test_with_warning_as_error)
        shell: Rscript {0}

      - name: Build vignettes
        run: |
          options(crayon.enabled = TRUE, warn = 2L)
          vignettes <- fs::dir_ls("vignettes/", glob = "*.Rmd", recurse = TRUE)
          purrr::walk(vignettes, rmarkdown::render)
        shell: Rscript {0}

  check-random-test-order:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          extra-packages: local::.

      - name: Run Tests in Random Order
        run: |
          options(crayon.enabled = TRUE)
          withr::local_envvar(TESTTHAT_PARALLEL = "FALSE")
          seed <- sample.int(1e6, 1L)
          cli::cli_inform("Chosen seed for the current test run: {seed}")
          set.seed(seed)
          testthat::test_dir("tests", shuffle = TRUE)
        shell: Rscript {0}

  check-readme:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: r-lib/actions/setup-pandoc@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          pandoc-version: "latest"

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          extra-packages: |
            deps::.
            ${{ inputs.extra-packages }}

      - name: Render README
        run: |
          options(crayon.enabled = TRUE, warn = 2L)
          rmarkdown::render("README.Rmd")
        shell: Rscript {0}
