on:
  workflow_call:

name: prek

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run prek
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
