# No official GitHub Action exists for CRAN submission; uses devtools::submit_cran()
on:
  workflow_call:
    inputs:
      extra-packages:
        type: string
        default: ''
        description: 'Additional packages to install (e.g., any::pkg1, any::pkg2)'

name: submit-cran

permissions:
  contents: read

jobs:
  submit-cran:
    name: Build and submit to CRAN
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release-tag: ${{ steps.meta.outputs.tag }}
      release-title: ${{ steps.meta.outputs.title }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          extra-packages: |
            any::devtools
            any::pkgbuild
            ${{ inputs.extra-packages }}

      - name: Resolve package metadata
        id: meta
        run: |
          pkg <- desc::desc_get_field("Package")
          ver <- as.character(desc::desc_get_version())
          out <- Sys.getenv("GITHUB_OUTPUT")
          cat("package=", pkg, "\n", sep = "", file = out, append = TRUE)
          cat("version=", ver, "\n", sep = "", file = out, append = TRUE)
          cat("tag=v",    ver, "\n", sep = "", file = out, append = TRUE)
          cat("title=",   pkg, " ", ver, "\n", sep = "", file = out, append = TRUE)
        shell: Rscript {0}

      - name: Build source tarball
        id: build
        run: |
          tarball <- pkgbuild::build(".", dest_path = ".", binary = FALSE)
          out <- Sys.getenv("GITHUB_OUTPUT")
          cat("tarball=", tarball, "\n", sep = "", file = out, append = TRUE)
        shell: Rscript {0}

      - name: Upload source tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-tarball
          path: ${{ steps.build.outputs.tarball }}
          retention-days: 1

      - name: Submit to CRAN
        run: |
          assignInNamespace("yesno", function(...) FALSE, "devtools")
          devtools::submit_cran()
        shell: Rscript {0}

  release:
    name: Create GitHub Release
    needs: submit-cran
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Required to create the release and tag.

    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - name: Download source tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: source-tarball
          path: release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.submit-cran.outputs.release-tag }}
          RELEASE_TITLE: ${{ needs.submit-cran.outputs.release-title }}
          TARGET_COMMIT: ${{ github.sha }}
        run: >-
          gh release create "$RELEASE_TAG" release-assets/*.tar.gz
          --title "$RELEASE_TITLE"
          --generate-notes
          --target "$TARGET_COMMIT"
