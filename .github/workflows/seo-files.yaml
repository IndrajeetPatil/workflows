on:
  workflow_call:
    inputs:
      package-name:
        type: string
        required: true
        description: "Package name (used for sitemap URL and llms.txt entries)"

name: Deploy SEO and agentic discovery files

permissions:
  contents: read

jobs:
  deploy-seo-files:
    name: Deploy SEO files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Required for the intentional push to gh-pages.
    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      # The final step intentionally pushes to gh-pages.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          persist-credentials: true

      - name: Validate package name
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          if [[ ! "$PACKAGE_NAME" =~ ^[A-Za-z][A-Za-z0-9._-]*$ ]]; then
            echo "::error::package-name must contain only letters, numbers, dots, underscores, and hyphens."
            exit 1
          fi

      - name: Create robots.txt
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          cat > robots.txt << EOF
          User-agent: *
          Allow: /

          # Explicitly allow AI crawlers for GEO and agentic access
          User-agent: GPTBot
          Allow: /

          User-agent: OAI-SearchBot
          Allow: /

          User-agent: ChatGPT-User
          Allow: /

          User-agent: ClaudeBot
          Allow: /

          User-agent: Claude-SearchBot
          Allow: /

          User-agent: anthropic-ai
          Allow: /

          User-agent: PerplexityBot
          Allow: /

          User-agent: Google-Extended
          Allow: /

          Sitemap: https://www.indrapatil.com/${PACKAGE_NAME}/sitemap.xml
          EOF

      - name: Create .well-known/llms.txt
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          mkdir -p .well-known
          cat > .well-known/llms.txt << EOF
          # LLM Documentation Index for ${PACKAGE_NAME}
          # Machine-readable package documentation for AI assistants
          # See https://llmstxt.org/ for the specification

          /${PACKAGE_NAME}/llms.txt: Concise package overview optimised for AI assistants
          /${PACKAGE_NAME}/llms-full.txt: Complete package documentation for AI assistants
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add robots.txt .well-known/
          git diff --staged --quiet || git commit -m "chore: update SEO and agentic discovery files"
          git push
