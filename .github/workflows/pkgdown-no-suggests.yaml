# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
#  NOTE: The {pkgdown} workflow in "noSuggests" mode makes sure that the vignettes or
# examples evaluated only on the website are also using soft dependencies conditionally.

on:
  workflow_call:
    inputs:
      pkgdown-source:
        type: string
        default: 'any::pkgdown'
        description: 'Source for pkgdown package (e.g., r-lib/pkgdown for GitHub version)'
name: pkgdown-no-suggests

jobs:
  pkgdown-no-suggests:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: r-lib/actions/setup-pandoc@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2.11.4
        with:
          pandoc-version: "latest"

      - uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2.11.4
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2.11.4
        with:
          dependencies: '"hard"'
          cache: false
          extra-packages: |
            any::knitr
            any::rmarkdown
            ${{ inputs.pkgdown-source }}
            local::.
          needs: website

      - name: Build site
        run: |
          options(crayon.enabled = TRUE)
          pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}
