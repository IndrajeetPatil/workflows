# Workflow derived from https://github.com/posit-dev/setup-air/tree/main/examples

on:
  workflow_call:

name: check-formatting

permissions: read-all

jobs:
  check-formatting:
    name: check-formatting
    runs-on: ubuntu-latest
    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install
        uses: posit-dev/setup-air@cf390573ff4fe0f198f35df3a642b1409328d859 # v1
        with:
          version: 0.9.0

      - name: Check formatting
        run: air format . --check
