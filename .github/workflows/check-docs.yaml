on:
  workflow_call:

name: check-docs

permissions:
  contents: read

jobs:
  check-link-rot:
    name: Check link rot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          fail: true

  check-spelling:
    name: Check spelling
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Spell Checker
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
