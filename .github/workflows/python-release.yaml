name: Release

on:
  workflow_call:
    inputs:
      version:
        description: "Version to release (leave blank to use version from pyproject.toml)"
        type: string
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create GitHub Release and Publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          version="$INPUT_VERSION"
          if [ -z "$version" ]; then
            version=$(uv version | awk '{print $NF}')
          fi
          echo "tag=${version}" >> "$GITHUB_OUTPUT"
          echo "title=${REPO_NAME} ${version}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          uv python install
          uv sync --all-extras --dev

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.title }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
