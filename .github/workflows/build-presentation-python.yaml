on:
  workflow_call:
    inputs:
      extra-render-args:
        type: string
        default: ''
        description: 'Extra arguments to pass to quarto render'

name: Build and Deploy Presentation

permissions:
  contents: read

jobs:
  build-presentation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        run: uv python install

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0
        with:
          version: release

      - name: Setup Pandoc (latest)
        uses: r-lib/actions/setup-pandoc@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2.11.4
        with:
          pandoc-version: latest

      - name: Install Quarto extensions
        run: |
          quarto --version
          pandoc --version | head -n 1
          quarto install extension quarto-ext/fontawesome --no-prompt

      - name: Install dependencies
        run: uv sync --frozen --no-install-project

      - name: Render slides
        run: |
          PANDOC_DIR="$(dirname "$(command -v pandoc)")"
          QUARTO_PANDOC="$PANDOC_DIR" uv run --no-project quarto render

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build-presentation
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
