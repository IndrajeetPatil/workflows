# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_call:
    inputs:
      no-suggests:
        type: boolean
        default: false
        description: 'Build with hard dependencies only (no Suggests); skips deployment'

name: pkgdown

permissions:
  contents: read

jobs:
  pkgdown:
    name: Build pkgdown site
    if: ${{ !inputs.no-suggests || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: r-lib/actions/setup-pandoc@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          pandoc-version: "latest"

      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          use-public-rspm: true

      - name: Install dependencies (no-suggests mode)
        if: inputs.no-suggests
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          dependencies: '"hard"'
          cache: false
          extra-packages: |
            any::knitr
            any::rmarkdown
            r-lib/pkgdown
            local::.
          needs: website

      - name: Install dependencies (full mode)
        if: ${{ !inputs.no-suggests }}
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          extra-packages: |
            r-lib/pkgdown
            local::.
          needs: website

      - name: Build site
        run: |
          options(crayon.enabled = TRUE)
          pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Add and verify canonical URLs
        run: |
          config_candidates <- c(
            Sys.getenv("PKGDOWN_CONFIG", unset = ""),
            "_pkgdown.yml",
            "_pkgdown.yaml",
            "pkgdown/_pkgdown.yml",
            "pkgdown/_pkgdown.yaml"
          )
          config_candidates <- config_candidates[
            nzchar(config_candidates) & file.exists(config_candidates)
          ]
          if (length(config_candidates) == 0) {
            stop("Cannot add canonical URLs: no pkgdown configuration file found.")
          }

          site_url <- yaml::read_yaml(config_candidates[[1]])$url
          if (is.null(site_url) || !grepl("^https://", site_url)) {
            stop("Cannot add canonical URLs: pkgdown 'url' must be an absolute HTTPS URL.")
          }
          site_url <- sub("/+$", "", site_url)

          html_files <- list.files(
            "docs",
            pattern = "\\.html$",
            recursive = TRUE,
            full.names = TRUE
          )
          if (length(html_files) == 0) {
            stop("Cannot add canonical URLs: pkgdown generated no HTML files.")
          }
          indexable_html_files <- html_files[basename(html_files) != "404.html"]

          canonical_pattern <- "<link[^>]+rel\\s*=\\s*[\"']canonical[\"'][^>]*>"
          added <- 0L
          for (html_file in indexable_html_files) {
            html <- readLines(html_file, warn = FALSE, encoding = "UTF-8")
            document <- paste(html, collapse = "\n")
            if (grepl(canonical_pattern, document, ignore.case = TRUE, perl = TRUE)) {
              next
            }

            relative_path <- sub("^docs/", "", html_file)
            canonical_url <- paste0(
              site_url,
              "/",
              utils::URLencode(relative_path, reserved = FALSE)
            )
            canonical_tag <- sprintf(
              "<link rel=\"canonical\" href=\"%s\">",
              canonical_url
            )

            insertion_line <- grep("<title(?:\\s|>)", html, ignore.case = TRUE, perl = TRUE)[1]
            if (is.na(insertion_line)) {
              insertion_line <- grep("<head(?:\\s|>)", html, ignore.case = TRUE, perl = TRUE)[1]
            }
            if (is.na(insertion_line)) {
              stop("Cannot add a canonical URL to ", html_file, ": no <head> element found.")
            }

            html <- append(html, canonical_tag, after = insertion_line)
            writeLines(html, html_file, useBytes = TRUE)
            added <- added + 1L
          }

          invalid <- vapply(indexable_html_files, function(html_file) {
            document <- paste(
              readLines(html_file, warn = FALSE, encoding = "UTF-8"),
              collapse = "\n"
            )
            matches <- gregexpr(
              canonical_pattern,
              document,
              ignore.case = TRUE,
              perl = TRUE
            )[[1]]
            canonical_count <- if (matches[[1]] == -1L) 0L else length(matches)
            canonical_count != 1L
          }, logical(1))
          if (any(invalid)) {
            stop(
              "Expected exactly one canonical URL in every indexable HTML file; invalid files: ",
              paste(indexable_html_files[invalid], collapse = ", ")
            )
          }

          message(
            "Verified exactly one canonical URL in ",
            length(indexable_html_files),
            " indexable HTML files (added ",
            added,
            "); skipped ",
            length(html_files) - length(indexable_html_files),
            " 404 utility page(s)."
          )
        shell: Rscript {0}

      - name: Upload pkgdown site
        if: ${{ !inputs.no-suggests && github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pkgdown-site
          path: docs
          include-hidden-files: true
          retention-days: 1

  deploy:
    name: Deploy pkgdown site
    if: ${{ !inputs.no-suggests && github.event_name != 'pull_request' }}
    needs: pkgdown
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # Required to publish the site to the gh-pages branch.

    steps:
      - name: Restrict to IndrajeetPatil repositories
        if: github.repository_owner != 'IndrajeetPatil'
        run: |
          echo "::error::This workflow is private and only available to repositories under IndrajeetPatil."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download pkgdown site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pkgdown-site
          path: docs

      - name: Deploy to GitHub pages 🚀
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: docs
